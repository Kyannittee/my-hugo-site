name: Hugo Build and Deploy

on:
  push:
    branches: [ "master" ]  # Или "main", если используете её

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout + Submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Важно для тем!
          fetch-depth: 0

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: '0.121.1'  # Фиксируем стабильную версию
          extended: true

      - name: Debug:List Files
        run: |
          ls -la themes/
          ls -la themes/hugo-theme-diary/

      - name: Build with Fallback
        run: |
          hugo --minify --gc --verbose || \
          (echo "::warning::Build failed, trying without theme..." && \
          hugo --minify --gc --verbose --ignoreVendor)

      - name: Deploy
        if: success() || failure()  # Деплой даже при частичном успехе
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          keep_files: false
